version: "3.9"

services:
  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: voicemfa
      POSTGRES_PASSWORD: voicemfa
      POSTGRES_DB: voicemfa
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voicemfa"]
      interval: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ── Backend (FastAPI) ────────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://voicemfa:voicemfa@postgres:5432/voicemfa
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-super-secret-change-in-production}
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      SIMILARITY_THRESHOLD: ${SIMILARITY_THRESHOLD:-0.72}
      MAX_FAILED_ATTEMPTS: ${MAX_FAILED_ATTEMPTS:-5}
      LOCKOUT_DURATION_MINUTES: ${LOCKOUT_DURATION_MINUTES:-15}
    volumes:
      - ./backend/app:/app/app  # hot reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Frontend (Vite dev server) ────────────────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_TARGET=http://backend:8000
    volumes:
      - ./frontend/src:/app/src          # hot reload
      - ./frontend/index.html:/app/index.html
    depends_on:
      - backend

volumes:
  pgdata:
